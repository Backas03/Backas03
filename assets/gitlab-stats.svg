<svg width="495" height="260" viewBox="0 0 495 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitLab Stats</title>
  <desc id="desc">GitLab stats card for backas</desc>

  <style>
    .bg { fill: #0d1117; }
    .card { fill: #161b22; stroke: #30363d; stroke-width: 1; }

    .title { fill: #e6edf3; font: 700 20px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
    .sub { fill: #8b949e; font: 400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }

    .label { font: 600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
    .value { fill: #f0f6fc; font: 700 24px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }

    .commit { fill: #58a6ff; }
    .push { fill: #a371f7; }
    .mr { fill: #f778ba; }
    .project { fill: #3fb950; }

    .divider { stroke: #30363d; stroke-width: 1; }
    .metaLabel { fill: #7d8590; font: 600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
    .metaValue { fill: #c9d1d9; font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }

    .foot { fill: #7d8590; font: 400 11px -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; }
  </style>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="495" height="260" rx="16"/>
  <rect class="card" x="10" y="10" width="475" height="240" rx="14"/>

  <!-- Header -->
  <text class="title" x="28" y="42">GitLab Activity</text>
  <text class="sub" x="28" y="64">@backas</text>

  <!-- Stats -->
  <text class="label commit" x="28" y="104">Commits</text>
  <text class="value" x="28" y="136">8354</text>

  <text class="label push" x="250" y="104">Push Events</text>
  <text class="value" x="250" y="136">1309</text>

  <text class="label mr" x="28" y="170">Merge Requests</text>
  <text class="value" x="28" y="202">165</text>

  <text class="label project" x="250" y="170">Projects</text>
  <text class="value" x="250" y="202">12</text>

  <!-- Divider -->
  <line class="divider" x1="28" y1="216" x2="467" y2="216"/>

  <!-- Meta -->
  <text class="metaLabel" x="28" y="234">Last commit</text>
  <text class="metaValue" x="105" y="234">feat(wip): chat channel impl</text>

  <text class="metaLabel" x="28" y="249">Last activity</text>
  <text class="metaValue" x="110" y="249">6d ago</text>

  <text class="foot" x="382" y="249" text-anchor="end">Updated: 2026-03-06 20:29 UTC</text>
</svg>
