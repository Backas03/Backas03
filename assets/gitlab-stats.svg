<svg width="495" height="260" viewBox="0 0 495 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitLab Stats</title>
  <desc id="desc">GitLab stats card for backas</desc>
  <style>
    .bg { fill: #0d1117; }
    .card { fill: #161b22; stroke: #30363d; stroke-width: 1; }

    .title { fill: #e6edf3; font: 700 20px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
    .sub { fill: #9da7b3; font: 400 13px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }

    .label { font: 600 12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
    .value { fill: #e6edf3; font: 700 24px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }

    .commit { fill: #58a6ff; }
    .push { fill: #a371f7; }
    .mr { fill: #f778ba; }
    .project { fill: #3fb950; }

    .metaLabel { fill: #7d8590; font: 600 12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
    .metaValue { fill: #c9d1d9; font: 400 12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }

    .foot { fill: #7d8590; font: 400 11px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
  </style>

  <rect class="bg" x="0" y="0" width="495" height="260" rx="16"/>
  <rect class="card" x="10" y="10" width="475" height="240" rx="14"/>

  <text class="title" x="28" y="42">GitLab Activity</text>
  <text class="sub" x="28" y="66">@backas</text>

  <text class="label commit" x="28" y="108">Commits</text>
  <text class="value" x="28" y="138">8354</text>

  <text class="label push" x="250" y="108">Push Events</text>
  <text class="value" x="250" y="138">1309</text>

  <text class="label mr" x="28" y="178">Merge Requests</text>
  <text class="value" x="28" y="208">165</text>

  <text class="label project" x="250" y="178">Projects</text>
  <text class="value" x="250" y="208">12</text>

  <text class="metaLabel" x="28" y="226">Last commit:</text>
  <text class="metaValue" x="110" y="226">feat(wip): chat channel impl</text>

  <text class="metaLabel" x="28" y="244">Last activity:</text>
  <text class="metaValue" x="115" y="244">6d ago</text>

  <text class="foot" x="320" y="244">Updated: 2026-03-06 20:24 UTC</text>
</svg>
