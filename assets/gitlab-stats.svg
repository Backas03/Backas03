<svg width="495" height="220" viewBox="0 0 495 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <style>
    .bg { fill: #0d1117; }
    .card { fill: #161b22; stroke: #30363d; stroke-width: 1; }

    .title { fill: #e6edf3; font: 700 20px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
    .sub { fill: #9da7b3; font: 400 13px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }

    .label { font: 600 12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
    .value { fill: #e6edf3; font: 700 24px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }

    .commit { fill: #58a6ff; }
    .push { fill: #f778ba; }
    .project { fill: #3fb950; }

    .foot { fill: #7d8590; font: 400 11px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif; }
  </style>

  <rect class="bg" x="0" y="0" width="495" height="220" rx="16"/>
  <rect class="card" x="10" y="10" width="475" height="200" rx="14"/>

  <!-- Header -->
  <text class="title" x="28" y="42">GitLab Activity</text>
  <text class="sub" x="28" y="66">@backas</text>

  <!-- Stats -->
  <text class="label commit" x="28" y="110">Commits</text>
  <text class="value" x="28" y="140">8354</text>

  <text class="label push" x="190" y="110">Push Events</text>
  <text class="value" x="190" y="140">1309</text>

  <text class="label project" x="350" y="110">Projects</text>
  <text class="value" x="350" y="140">12</text>

  <!-- Activity -->
  <text class="sub" x="28" y="180">Last activity: 6d ago</text>

  <!-- Footer -->
  <text class="foot" x="320" y="200">Updated: 2026-03-06 20:13 UTC</text>

</svg>
